    <!--
      Fonts load without blocking first render: the stylesheet is preloaded,
      then promoted to a live stylesheet once it arrives, so the browser never
      waits on Google Fonts before painting.
    -->
    <!--
      Returning visitors have already seen the opening curtain this session.
      Hiding it here, before first paint, means the pre-rendered page never
      flashes the curtain at someone who does not need to see it again.
    -->
    <script>
      try {
        if (sessionStorage.getItem("zendale-preloaded")) {
          document.documentElement.classList.add("z-preloaded");
        }
      } catch (e) {}
    </script>

    <!--
      Scroll-reveal bootstrap.

      Runs before first paint and independently of React, so revealed content
      appears as soon as the HTML is parsed rather than waiting for the
      JavaScript bundle. If motion is not wanted, IntersectionObserver is
      unavailable, or anything throws, .z-anim is never applied and every
      element simply stays visible.
    -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          if (!("IntersectionObserver" in window)) return;
          if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

          root.classList.add("z-anim");

          var io = new IntersectionObserver(
            function (entries) {
              for (var i = 0; i < entries.length; i++) {
                if (entries[i].isIntersecting) {
                  entries[i].target.classList.add("is-in");
                  io.unobserve(entries[i].target);
                }
              }
            },
            { rootMargin: "0px 0px -60px 0px" }
          );

          var timer;
          function scan() {
            var nodes = document.querySelectorAll(".z-reveal:not(.is-in)");
            for (var i = 0; i < nodes.length; i++) io.observe(nodes[i]);
          }
          function schedule() {
            clearTimeout(timer);
            timer = setTimeout(scan, 80);
          }

          // Exposed so route changes can re-scan without a DOM diff.
          window.__zReveal = schedule;

          function start() {
            /*
             * Two frames before the first scan. The browser needs to paint the
             * hidden state once for the transition to have somewhere to start
             * from; scanning immediately meant anything already on screen —
             * the whole hero — snapped in with no animation at all.
             */
            requestAnimationFrame(function () {
              requestAnimationFrame(scan);
            });
            // Content can also appear from filters and lazy chunks.
            new MutationObserver(schedule).observe(document.body, {
              childList: true,
              subtree: true,
            });
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", start);
          } else {
            start();
          }

          // Failsafe: nothing stays hidden if the observer never fires.
          setTimeout(function () {
            if (!document.querySelector(".z-reveal.is-in")) root.classList.remove("z-anim");
          }, 4000);
        } catch (e) {
          document.documentElement.classList.remove("z-anim");
        }
      })();
    </script>
