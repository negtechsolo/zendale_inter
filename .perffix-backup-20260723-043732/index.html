    <!--
      Fonts load without blocking first render: the stylesheet is preloaded,
      then promoted to a live stylesheet once it arrives, so the browser never
      waits on Google Fonts before painting.
    -->
    <!--
      Returning visitors have already seen the opening curtain this session.
      Hiding it here, before first paint, means the pre-rendered page never
      flashes the curtain at someone who does not need to see it again.
    -->
    <script>
      try {
        if (sessionStorage.getItem("zendale-preloaded")) {
          document.documentElement.classList.add("z-preloaded");
        }
      } catch (e) {}
    </script>
